name: Update README stats

on:
  push:
    branches:
      - main
      - agent/redesign-profile-readme
    paths:
      - README.md
      - .github/workflows/update-readme-stats.yml
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

concurrency:
  group: update-readme-stats-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Generate GitHub statistics card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&include_all_commits=true&hide_rank=true&show=reviews,prs_merged&number_format=long&locale=en&hide_border=true&bg_color=00000000&title_color=58A6FF&text_color=8B949E&icon_color=58A6FF
          path: profile/stats.svg
          core_version: 2.1.3
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated card
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/stats.svg
          git commit -m "Update README statistics" || exit 0
          git push
